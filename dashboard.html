<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Technician Pro - Horizon Edition</title>
    <!-- Fontes e Ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>

    <!-- Sidebar Lateral -->
    <aside class="sidebar">
        <div class="sidebar-logo">
            Technician <span>Pro</span>
        </div>
        <nav class="nav-menu">
            <button class="nav-item active" onclick="showScreen('dashboard')">
                <i class="fas fa-chart-line"></i> <span>Dashboard</span>
            </button>
            <button class="nav-item" onclick="showScreen('ordens')">
                <i class="fas fa-tools"></i> <span>Ordens de Serviço</span>
            </button>
            <button class="nav-item" onclick="showScreen('kanban')">
                <i class="fas fa-columns"></i> <span>Fluxo Kanban</span>
            </button>
            <button class="nav-item" onclick="showScreen('estoque')">
                <i class="fas fa-box"></i> <span>Estoque</span>
            </button>
            <button class="nav-item" onclick="toggleTheme()">
                <i class="fas fa-adjust"></i> <span>Trocar Tema</span>
            </button>
            <button class="nav-item btn-logout">
                <i class="fas fa-sign-out-alt"></i> <span>Sair</span>
            </button>
        </nav>
    </aside>

    <!-- Conteúdo Principal -->
    <main class="main-wrapper">
        
        <!-- Banner de Boas-Vindas -->
        <header class="welcome-banner">
            <h1>Horizon Edition</h1>
            <p id="current-date">Carregando data...</p>
        </header>

        <!-- Seção de Novo Registro (Modal de Exemplo) -->
        <section class="form-card animate-in">
            <div class="section-header" style="text-align: center; margin-bottom: 25px;">
                <h2 style="font-family: 'Forum'; font-size: 1.8rem;">
                    <i class="far fa-edit" style="color: var(--primary-sunset);"></i> Novo Registro
                </h2>
            </div>

            <form id="os-form">
                <!-- Grid: Cliente e CPF -->
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="input-group">
                        <label><i class="fas fa-user"></i> Cliente</label>
                        <input type="text" id="cli-nome" placeholder="Ex: João Silva" required>
                    </div>
                    <div class="input-group">
                        <label><i class="fas fa-address-card"></i> CPF (Para consulta externa)</label>
                        <input type="text" id="cli-cpf" placeholder="000.000.000-00">
                    </div>
                </div>

                <!-- Aparelho -->
                <div class="input-group">
                    <label><i class="fas fa-tablet-alt"></i> Aparelho</label>
                    <input type="text" id="apa-nome" placeholder="Ex: iPhone 13 Pro" required>
                </div>

                <!-- Fotos -->
                <div class="input-group">
                    <label><i class="fas fa-camera"></i> Fotos de Entrada (Evidências)</label>
                    <input type="file" id="os-fotos" multiple accept="image/*">
                </div>

                <!-- Defeito -->
                <div class="input-group">
                    <label><i class="fas fa-comment-dots"></i> Defeito Relatado</label>
                    <textarea id="apa-defeito" rows="3" placeholder="Descreva o problema..."></textarea>
                </div>

                <!-- Checklist -->
                <div class="checklist-container">
                    <label><i class="fas fa-list-check"></i> Checklist de Entrada</label>
                    <div class="checklist-grid">
                        <label><input type="checkbox" class="os-check" value="Liga"> Liga</label>
                        <label><input type="checkbox" class="os-check" value="Touch OK"> Touch OK</label>
                        <label><input type="checkbox" class="os-check" value="Carregando"> Carregando</label>
                        <label><input type="checkbox" class="os-check" value="Câmeras"> Câmeras</label>
                        <label><input type="checkbox" class="os-check" value="Sem Riscos"> Sem Riscos</label>
                    </div>
                </div>

                <!-- Grid: Financeiro -->
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px;">
                    <div class="input-group">
                        <label><i class="fas fa-hand-holding-dollar"></i> Valor Mão de Obra (R$)</label>
                        <input type="number" id="os-valor" placeholder="0.00" step="0.01">
                    </div>
                    <div class="input-group">
                        <label><i class="fas fa-credit-card"></i> Forma de Pagamento</label>
                        <select id="os-pagamento">
                            <option value="pix">Pix / Dinheiro (Taxa 0%)</option>
                            <option value="debito">Cartão Débito</option>
                            <option value="credito">Cartão Crédito</option>
                        </select>
                    </div>
                </div>

                <!-- Peça Utilizada -->
                <div class="input-group">
                    <label><i class="fas fa-microchip"></i> Peça Utilizada</label>
                    <select id="os-peca">
                        <option value="">Selecione uma peça do estoque...</option>
                        <!-- Populado via JS -->
                    </select>
                </div>

                <!-- Botões de Ação -->
                <div class="form-buttons">
                    <button type="button" class="btn-secondary">
                        <i class="fas fa-file-invoice-dollar"></i> Gerar Orçamento
                    </button>
                    <button type="submit" class="btn-primary-gradient">
                        Criar Ordem de Serviço
                    </button>
                </div>
            </form>
        </section>

    </main>

    <script src="dashboard.js"></script>
</body>
</html>

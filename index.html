<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Login Page</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Forum&display=swap" rel="stylesheet">
  <link rel="icon" type="image/x-icon" href="Captura de tela 2026-05-06 155442.png">
    <link rel="stylesheet" href="login.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

</head>

    <body>
    <div class="container">
        <section class="login-section">
            <div class="login-box">
                <h1>Faça seu <span>Login</span></h1>
                
                <form action="#">
                    <div class="input-group">
                        <label for="email"><i class="fa-regular fa-envelope"></i> Email</label>
                        <input type="email" id="email" placeholder="Seu email" required>
                    </div>

                    <div class="input-group">
                        <label for="password"><i class="fa-solid fa-lock"></i> Senha</label>
                        <input type="password" id="password" placeholder="Sua senha" required>
                    </div>

                    <a href="#" class="forgot-password">Esqueci minha senha</a>

                    <button type="submit" class="btn-login">ENTRAR</button>

                   <a href="cadastro.html" class="signup-link">Ainda não tem uma conta? <span>Cadastre-se</span></a>
                </form>
            </div>
        </section>

        <section class="image-section"></section>
        <script src="login.js"></script>
    </div>
</body>
